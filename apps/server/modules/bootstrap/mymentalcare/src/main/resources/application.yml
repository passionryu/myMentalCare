server:
  port: ${PORT:3001}

spring:
  application:
    name: my-mental-care
  data:
    redis:
      host: ${MY_MENTAL_CARE_REDIS_HOST:localhost}
      port: ${MY_MENTAL_CARE_REDIS_PORT:6380}
  profiles:
    include:
      - datasource

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

mymentalcare:
  cors:
    allowed-origins: ${MY_MENTAL_CARE_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    jwt:
      secret: ${MY_MENTAL_CARE_JWT_SECRET:local-mymentalcare-jwt-secret-must-be-changed}
      access-token-expiration: ${MY_MENTAL_CARE_ACCESS_TOKEN_EXPIRATION:1h}
      refresh-token-expiration: ${MY_MENTAL_CARE_REFRESH_TOKEN_EXPIRATION:7d}
  auth:
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3001/api/auth/kakao/callback}
      web-callback-url: ${WEB_AUTH_KAKAO_CALLBACK_URL:http://localhost:3000/auth/kakao/callback}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-5-nano}
      timeout: ${OPENAI_TIMEOUT:20s}
  notification:
    discord-webhook-url: ${DISCORD_WEBHOOK_URL:}
