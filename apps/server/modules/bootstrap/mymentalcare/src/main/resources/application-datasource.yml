spring:
  datasource:
    url: ${MY_MENTAL_CARE_DATASOURCE_URL:jdbc:mariadb://${MARIADB_HOST:${MYSQLHOST:localhost}}:${MARIADB_PORT:${MYSQLPORT:3310}}/${MARIADB_DATABASE:${MYSQLDATABASE:mymentalcare}}}
    username: ${MY_MENTAL_CARE_DATASOURCE_USERNAME:${MARIADB_USER:${MYSQLUSER:mymentalcare}}}
    password: ${MY_MENTAL_CARE_DATASOURCE_PASSWORD:${MARIADB_PASSWORD:${MYSQLPASSWORD:mymentalcare-local}}}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${MY_MENTAL_CARE_REDIS_HOST:${REDIS_HOST:localhost}}
      port: ${MY_MENTAL_CARE_REDIS_PORT:${REDIS_PORT:6380}}
      password: ${MY_MENTAL_CARE_REDIS_PASSWORD:${REDIS_PASSWORD:}}
