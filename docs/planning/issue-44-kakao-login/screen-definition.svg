<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#edf7f5"/>
      <stop offset="0.52" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#f3e4d2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#382b1c" flood-opacity="0.13"/>
    </filter>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:900;fill:#1f2a22;letter-spacing:0}
      .body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:700;fill:#5f685f;letter-spacing:0}
      .small{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:800;fill:#687169;font-size:18px;letter-spacing:0}
      .label{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:900;fill:#b96d4f;font-size:19px;letter-spacing:0}
      .card{fill:rgba(255,253,247,.86);stroke:#d9d8cf;stroke-width:2;filter:url(#shadow)}
      .green{fill:#31543a}.kakao{fill:#FEE500}.ink{fill:#1f2a22}.muted{fill:#687169}.line{stroke:#d9d8cf;stroke-width:2}.accentLine{stroke:#31543a;stroke-width:4;stroke-linecap:round}
    </style>
  </defs>

  <rect width="1600" height="1120" fill="url(#bg)"/>
  <text x="90" y="90" class="label">Issue #44 화면 정의서</text>
  <text x="90" y="145" class="title" font-size="54">카카오 로그인은 “로그인 모달의 최상위 선택지”로 배치</text>
  <text x="90" y="190" class="body" font-size="24">비밀번호 입력 전에 소셜 로그인을 먼저 인지하게 하고, 기존 이메일 로그인은 하단 대안으로 유지합니다.</text>

  <!-- Desktop -->
  <rect x="80" y="255" width="720" height="710" rx="34" class="card"/>
  <text x="124" y="315" class="label">Desktop / 로그인 모달</text>
  <text x="124" y="365" class="title" font-size="42">다시 만나서 반가워요</text>
  <text x="124" y="404" class="body" font-size="22">나의 마음 기록 공간으로 돌아갑니다.</text>

  <rect x="124" y="448" width="632" height="72" rx="24" class="kakao"/>
  <circle cx="166" cy="484" r="18" fill="#1f2a22"/>
  <path d="M156 484c0-8 7-14 16-14s16 6 16 14-7 14-16 14c-2 0-4 0-6-1l-8 5 2-8c-3-2-4-6-4-10z" fill="#FEE500"/>
  <text x="204" y="493" class="ink" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" font-weight="900">카카오로 계속하기</text>
  <text x="124" y="555" class="small">또는 아이디로 로그인</text>
  <line x1="318" y1="548" x2="756" y2="548" class="line"/>

  <text x="124" y="605" class="small">아이디 또는 이메일</text>
  <rect x="124" y="625" width="632" height="62" rx="18" fill="#fffdf7" stroke="#d9d8cf" stroke-width="2"/>
  <text x="148" y="665" class="body" font-size="20">아이디 또는 이메일</text>
  <text x="124" y="725" class="small">비밀번호</text>
  <rect x="124" y="745" width="632" height="62" rx="18" fill="#fffdf7" stroke="#d9d8cf" stroke-width="2"/>
  <text x="148" y="785" class="body" font-size="20">비밀번호를 입력하세요</text>
  <rect x="124" y="840" width="250" height="62" rx="31" fill="#f8f3e9" stroke="#d9d8cf" stroke-width="2"/>
  <text x="208" y="880" class="green" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="22" font-weight="900">취소</text>
  <rect x="392" y="840" width="364" height="62" rx="31" class="green"/>
  <text x="542" y="880" fill="#fffdf7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="22" font-weight="900">로그인</text>

  <!-- Mobile -->
  <rect x="860" y="255" width="320" height="710" rx="42" fill="#242424" filter="url(#shadow)"/>
  <rect x="878" y="280" width="284" height="660" rx="34" fill="#fffaf0"/>
  <text x="900" y="330" class="label">Mobile</text>
  <text x="900" y="374" class="title" font-size="32">로그인</text>
  <text x="900" y="410" class="body" font-size="17">짧게 돌아와서 이어가기</text>
  <rect x="900" y="448" width="240" height="58" rx="20" class="kakao"/>
  <circle cx="928" cy="477" r="14" fill="#1f2a22"/>
  <text x="955" y="484" class="ink" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="900">카카오로 계속하기</text>
  <text x="900" y="548" class="small" font-size="15">또는 아이디로 로그인</text>
  <rect x="900" y="582" width="240" height="54" rx="16" fill="#fffdf7" stroke="#d9d8cf" stroke-width="2"/>
  <text x="920" y="616" class="body" font-size="15">아이디 또는 이메일</text>
  <rect x="900" y="654" width="240" height="54" rx="16" fill="#fffdf7" stroke="#d9d8cf" stroke-width="2"/>
  <text x="920" y="688" class="body" font-size="15">비밀번호</text>
  <rect x="900" y="742" width="240" height="56" rx="28" class="green"/>
  <text x="994" y="778" fill="#fffdf7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="900">로그인</text>
  <text x="914" y="850" class="body" font-size="15">처음이라면 회원가입</text>

  <!-- Flow -->
  <rect x="1230" y="255" width="290" height="710" rx="34" class="card"/>
  <text x="1262" y="315" class="label">Callback / 상태 처리</text>
  <circle cx="1290" cy="385" r="16" class="green"/>
  <line x1="1290" y1="405" x2="1290" y2="825" class="accentLine"/>
  <circle cx="1290" cy="505" r="16" fill="#FEE500" stroke="#31543a" stroke-width="4"/>
  <circle cx="1290" cy="650" r="16" fill="#fffdf7" stroke="#31543a" stroke-width="4"/>
  <circle cx="1290" cy="825" r="16" class="green"/>
  <text x="1324" y="392" class="title" font-size="24">1. 시작</text>
  <text x="1324" y="424" class="body" font-size="18">/api/auth/kakao/login 이동</text>
  <text x="1324" y="512" class="title" font-size="24">2. 카카오 인증</text>
  <text x="1324" y="544" class="body" font-size="18">동의/취소/거부</text>
  <text x="1324" y="657" class="title" font-size="24">3. 서버 callback</text>
  <text x="1324" y="689" class="body" font-size="18">회원 조회/생성 + JWT 발급</text>
  <text x="1324" y="832" class="title" font-size="24">4. 앱 복귀</text>
  <text x="1324" y="864" class="body" font-size="18">토큰 저장 + 완료 안내</text>

  <path d="M760 484 C830 484 826 484 900 484" stroke="#31543a" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="10 12"/>
  <path d="M1140 477 C1190 477 1190 385 1270 385" stroke="#31543a" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="10 12"/>

  <rect x="90" y="1010" width="1420" height="66" rx="24" fill="rgba(255,253,247,.66)" stroke="#d9d8cf" stroke-width="2"/>
  <text x="125" y="1052" class="body" font-size="22">UX 원칙: 카카오 버튼은 로그인 모달의 첫 번째 primary 선택지. 회원가입 화면에도 동일 버튼을 제공하되 문구는 “카카오로 시작하기”로 변경.</text>
</svg>
