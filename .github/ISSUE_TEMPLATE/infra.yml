name: Infra
description: Docker, CI/CD, 배포, 운영 환경 작업
title: "[Infra] "
labels: ["type: infra"]
body:
  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 인프라/배포 관점에서 달성해야 하는 목표를 적어주세요.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: Docker, CI/CD, 배포, 네트워크, 저장소, 로그 등 변경 범위를 적어주세요.
    validations:
      required: true
  - type: textarea
    id: rollback
    attributes:
      label: 롤백/복구 전략
      description: 실패 시 되돌리는 방법과 영향 범위를 적어주세요.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 완료 기준
      description: 검증 명령, 배포 확인, 모니터링 기준을 적어주세요.
    validations:
      required: true
