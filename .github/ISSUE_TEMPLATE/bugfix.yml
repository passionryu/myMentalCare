name: Bugfix
description: 일반 버그 수정
title: "[Bugfix] "
labels: ["type: bugfix"]
body:
  - type: textarea
    id: symptom
    attributes:
      label: 증상
      description: 사용자가 겪는 문제나 잘못된 동작을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 문제를 재현하는 단계와 입력값을 적어주세요.
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 정상이라면 어떻게 동작해야 하는지 적어주세요.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 완료 기준
      description: 수정 완료와 regression test 기준을 적어주세요.
    validations:
      required: true
